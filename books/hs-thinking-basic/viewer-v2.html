<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GFIELD-ON HS THINKING BASIC Viewer v2</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{--bg:#02050b;--panel:#07111f;--panel2:#0d1728;--gold:#d4af37;--gold2:#f8dd83;--line:rgba(255,255,255,.1);--muted:#9ca3af;--white:#f8fafc}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#02050b;color:var(--white);font-family:Pretendard,-apple-system,BlinkMacSystemFont,sans-serif}body{background:linear-gradient(145deg,#02050b,#07111f 62%,#02050b)}button,a{font-family:inherit}.app{height:100%;display:grid;grid-template-rows:70px 82px minmax(0,1fr)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(5,9,17,.92);backdrop-filter:blur(16px)}.brand{display:flex;align-items:baseline;gap:10px;min-width:0}.brand b{font-size:23px;font-weight:1000;letter-spacing:-.04em;white-space:nowrap}.brand span{color:var(--gold2);font-size:11px;font-weight:1000;letter-spacing:.18em;white-space:nowrap}.student{display:flex;align-items:center;gap:10px}.student small{display:block;color:var(--gold2);font-size:10px;font-weight:1000;letter-spacing:.16em}.student strong{display:block;margin-top:2px;font-size:16px;font-weight:1000;white-space:nowrap}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 13px;border-radius:13px;border:1px solid var(--line);background:rgba(255,255,255,.055);color:#f8fafc;text-decoration:none;font-size:12px;font-weight:1000;cursor:pointer}.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#07111f;border:0}.lessonbar{min-width:0;display:flex;align-items:center;gap:10px;overflow-x:auto;padding:12px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(13,23,40,.96),rgba(7,13,24,.96))}.lesson-group{display:flex;align-items:center;gap:8px;flex:none}.group-label{display:inline-flex;align-items:center;min-height:34px;padding:0 10px;border-radius:999px;background:rgba(248,221,131,.09);border:1px solid rgba(248,221,131,.18);color:#f8dd83;font-size:11px;font-weight:1000;letter-spacing:.08em;white-space:nowrap}.lesson-btn{display:inline-flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:3px;min-width:128px;min-height:54px;padding:8px 11px;border-radius:16px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);color:#f8fafc;text-align:left;cursor:pointer;transition:.16s}.lesson-btn:hover,.lesson-btn.active{transform:translateY(-1px);border-color:rgba(212,175,55,.36);background:rgba(212,175,55,.12)}.lesson-btn strong{font-size:13px;font-weight:1000;letter-spacing:-.035em;white-space:nowrap}.lesson-btn span{font-size:10.5px;color:#aeb8c8;font-weight:900;white-space:nowrap}.workspace{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:0}.book-area{min-height:0;position:relative;background:#30343a}.book-frame{display:block;width:100%;height:100%;border:0;background:#525659}.right-panel{min-height:0;overflow:auto;border-left:1px solid var(--line);background:linear-gradient(180deg,rgba(12,23,40,.98),rgba(5,10,18,.98));padding:14px}.video-card,.tool-card{border:1px solid rgba(255,255,255,.09);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));padding:14px;margin-bottom:12px}.panel-kicker{display:block;color:#f8dd83;font-size:11px;font-weight:1000;letter-spacing:.18em}.video-title{margin:10px 0 0;font-size:22px;line-height:1.18;font-weight:1000;letter-spacing:-.05em}.video-note{margin:9px 0 0;color:#cbd5e1;font-size:13px;line-height:1.6}.video-box{position:relative;margin-top:13px;aspect-ratio:16/9;border-radius:18px;overflow:hidden;background:#02050b;border:1px solid rgba(255,255,255,.08)}.video-box iframe{width:100%;height:100%;border:0;display:block}.tool-grid{display:grid;gap:8px}.tool-grid a,.tool-grid button{display:flex;align-items:center;justify-content:center;min-height:44px;border-radius:14px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);color:#f8fafc;text-decoration:none;font-size:13px;font-weight:1000;cursor:pointer}.tool-grid .gold{background:linear-gradient(135deg,var(--gold),var(--gold2));border:0;color:#07111f}.empty-video{display:grid;place-items:center;min-height:210px;text-align:center;color:#94a3b8;font-size:13px;line-height:1.65;padding:18px}.dock{position:absolute;left:14px;bottom:14px;z-index:6;display:flex;gap:8px;align-items:center;padding:9px 12px;border-radius:999px;background:rgba(5,9,17,.78);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px);box-shadow:0 16px 42px rgba(0,0,0,.28);font-size:12px;font-weight:1000;color:#f8dd83}.loading{position:absolute;inset:0;z-index:10;display:grid;place-items:center;background:linear-gradient(145deg,#07111f,#02050b);color:#f8dd83;font-weight:1000;letter-spacing:.08em}.loading[hidden]{display:none}.spinner{width:28px;height:28px;border-radius:999px;border:3px solid rgba(248,221,131,.22);border-top-color:#f8dd83;animation:spin .8s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}body.book-only .app{grid-template-rows:60px minmax(0,1fr)}body.book-only .lessonbar,body.book-only .right-panel{display:none}body.book-only .workspace{grid-template-columns:1fr}.mobile-tools{display:none}@media(max-width:980px){.app{grid-template-rows:62px 78px minmax(0,1fr)}.brand span{display:none}.workspace{grid-template-columns:1fr}.right-panel{display:none}.mobile-tools{display:flex}.actions .desktop-only{display:none}.lesson-btn{min-width:118px}.student strong{font-size:14px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><b>GFIELD E-BOOK</b><span>HS THINKING BASIC</span></div>
    <div class="student"><div><small>STUDENT</small><strong id="studentName">노관호</strong></div></div>
    <div class="actions">
      <button class="btn primary" type="button" id="startBtn">시작하기</button>
      <button class="btn" type="button" id="askBtn">AI-DOC 질문</button>
      <button class="btn" type="button" id="bookOnlyBtn">책만 보기</button>
      <a class="btn desktop-only" href="../../gfield-on-archive-preview.html">나가기</a>
    </div>
  </header>
  <nav class="lessonbar" id="lessonbar" aria-label="강의 버튼"></nav>
  <main class="workspace">
    <section class="book-area">
      <iframe id="bookFrame" class="book-frame" title="HS THINKING BASIC 교재" src="./thinking-basic.html"></iframe>
      <div class="dock" id="pageDock">현재 위치: 준비 중</div>
      <div class="loading" id="loading"><div><div class="spinner"></div>교재를 불러오는 중입니다.</div></div>
    </section>
    <aside class="right-panel">
      <section class="video-card">
        <span class="panel-kicker">CONNECTED VIDEO</span>
        <h2 class="video-title" id="videoTitle">강의 버튼을 선택하세요.</h2>
        <p class="video-note" id="videoNote">상단 강의 버튼을 누르면 교재는 해당 쪽으로 자동 스크롤되고, 이 영역에는 연결 영상이 함께 표시됩니다.</p>
        <div class="video-box" id="videoBox"><div class="empty-video">영상이 선택되면<br>이곳에서 책과 함께 볼 수 있습니다.</div></div>
      </section>
      <section class="tool-card">
        <span class="panel-kicker">STUDY TOOLS</span>
        <div class="tool-grid" style="margin-top:12px">
          <button class="gold" type="button" id="sideAskBtn">현재 쪽 AI-DOC 질문</button>
          <a id="openVideoBtn" href="#" target="_blank" rel="noopener">영상 새창으로 보기</a>
          <button type="button" id="materialBtn">추가 자료</button>
          <button type="button" id="answerBtn">답안 자료</button>
        </div>
      </section>
      <section class="tool-card">
        <span class="panel-kicker">DOCSSAM NOTE</span>
        <p class="video-note">정답을 바로 알려주기보다, 먼저 어느 쪽의 어떤 문제에서 막혔는지 확인하는 지필드식 질문 흐름으로 이어집니다.</p>
      </section>
    </aside>
  </main>
</div>
<script>
const LESSONS=[
  {group:'문제푸는 방법 찾기(1)',label:'1단원 개념',page:'2',target:'gfield-page-002',title:'문제푸는 방법 찾기(1) · 개념',video:'https://youtu.be/20OIED2hezI?si=nooj_2XXt9oRVDcs',note:'실제 개념 유형 1 시작'},
  {group:'문제푸는 방법 찾기(1)',label:'1단원 필수유형',page:'5',target:'gfield-page-005',title:'문제푸는 방법 찾기(1) · 필수유형',video:'https://youtu.be/20OIED2hezI?si=Eppn2W_4Joe-QZWE&t=1875',note:'필수유형 시작'},
  {group:'문제푸는 방법 찾기(2)',label:'2단원 개념',page:'13',target:'gfield-page-013',title:'문제푸는 방법 찾기(2) · 개념',video:'https://youtu.be/HtSd564pCpw?si=15Inv0cVtonKn_ww',note:'실제 개념 유형 1 시작'},
  {group:'문제푸는 방법 찾기(2)',label:'2단원 필수유형',page:'18',target:'gfield-page-018',title:'문제푸는 방법 찾기(2) · 필수유형',video:'https://youtu.be/hDPKx7cQtIw',note:'필수유형 시작'},
  {group:'규칙 찾아 해결하기(1)',label:'3단원 개념',page:'26',target:'gfield-page-026',title:'규칙 찾아 해결하기(1) · 개념',video:'https://youtu.be/8Wz-g95UGVg?si=z-12_yWB0TYpaAFP',note:'실제 개념 유형 1 시작'},
  {group:'규칙 찾아 해결하기(1)',label:'3단원 필수유형',page:'30',target:'gfield-page-030',title:'규칙 찾아 해결하기(1) · 필수유형',video:'https://youtu.be/PYHnn1x2dlM?si=1e4X7QOs-TuwEDa6&t=843',note:'필수유형 시작'}
];
const frame=document.getElementById('bookFrame');
const loading=document.getElementById('loading');
const pageDock=document.getElementById('pageDock');
let currentLesson=null;
function youtubeId(url){
  const value=String(url||'');
  const short=value.match(/youtu\.be\/([^?&/]+)/);
  if(short)return short[1];
  const long=value.match(/[?&]v=([^?&/]+)/);
  if(long)return long[1];
  return '';
}
function youtubeStart(url){
  const value=String(url||'');
  const t=value.match(/[?&]t=(\d+)/);
  return t?Number(t[1]):0;
}
function setVideo(lesson){
  currentLesson=lesson;
  document.getElementById('videoTitle').textContent=lesson.title;
  document.getElementById('videoNote').textContent=`${lesson.page}쪽 · ${lesson.note}`;
  document.getElementById('openVideoBtn').href=lesson.video;
  const id=youtubeId(lesson.video);
  const start=youtubeStart(lesson.video);
  const src=id?`https://www.youtube.com/embed/${id}?rel=0&modestbranding=1${start?`&start=${start}`:''}`:'';
  document.getElementById('videoBox').innerHTML=src?`<iframe src="${src}" title="${lesson.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`:'<div class="empty-video">연결된 영상이 없습니다.</div>';
}
function buildLessonbar(){
  const bar=document.getElementById('lessonbar');
  const groups=[...new Set(LESSONS.map(l=>l.group))];
  bar.innerHTML=groups.map(group=>{
    const items=LESSONS.filter(l=>l.group===group).map((lesson,index)=>`<button class="lesson-btn" type="button" data-target="${lesson.target}"><strong>${lesson.label}</strong><span>${lesson.page}쪽 · ${lesson.note}</span></button>`).join('');
    return `<div class="lesson-group"><span class="group-label">${group}</span>${items}</div>`;
  }).join('');
  bar.querySelectorAll('.lesson-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const lesson=LESSONS.find(l=>l.target===btn.dataset.target);
      if(!lesson)return;
      bar.querySelectorAll('.lesson-btn').forEach(item=>item.classList.remove('active'));
      btn.classList.add('active');
      setVideo(lesson);
      scrollToPage(lesson.target,lesson.page);
    });
  });
}
function setupFramePages(){
  try{
    const doc=frame.contentDocument;
    if(!doc)return false;
    const pages=[...doc.querySelectorAll('.page')];
    pages.forEach((page,index)=>{
      page.dataset.gfieldIndex=String(index+1);
      const footerText=page.querySelector('.footer-page-num')?.textContent||'';
      const match=footerText.match(/-\s*([0-9]+(?:-[0-9]+)?)\s*-/);
      if(match){
        const raw=match[1];
        const numeric=raw.split('-')[0].padStart(3,'0');
        page.id=`gfield-page-${numeric}`;
        page.dataset.bookPage=raw;
      }else if(index===0){
        page.id='gfield-page-cover';
      }
    });
    doc.documentElement.style.scrollBehavior='smooth';
    loading.hidden=true;
    pageDock.textContent='현재 위치: 표지';
    return true;
  }catch(error){
    loading.hidden=true;
    pageDock.textContent='교재 제어 권한을 확인해야 합니다.';
    return false;
  }
}
function scrollToPage(target,pageLabel){
  const doc=frame.contentDocument;
  if(!doc)return;
  let el=doc.getElementById(target);
  if(!el){
    const number=String(pageLabel||'').padStart(3,'0');
    el=doc.getElementById(`gfield-page-${number}`);
  }
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'start'});
    pageDock.textContent=`현재 위치: ${pageLabel}쪽`;
  }else{
    pageDock.textContent=`${pageLabel}쪽 위치를 찾지 못했습니다.`;
  }
}
function askCurrent(){
  const student=document.getElementById('studentName').textContent;
  const lesson=currentLesson;
  const page=lesson?.page||'현재';
  const title=lesson?.title||'HS THINKING BASIC';
  alert(`${student} 학생 질문 초안\n\n${title} ${page}쪽에서 막혔습니다.\n정답부터 말하지 말고 어디서 막혔는지부터 확인해 주세요.`);
}
(function init(){
  const params=new URLSearchParams(location.search);
  const student=params.get('student')||sessionStorage.getItem('gfield_student_name')||'노관호';
  document.getElementById('studentName').textContent=student;
  try{sessionStorage.setItem('gfield_student_name',student)}catch(error){}
  buildLessonbar();
  frame.addEventListener('load',()=>{
    setupFramePages();
    const first=LESSONS[0];
    setVideo(first);
  });
  document.getElementById('startBtn').addEventListener('click',()=>{
    const first=LESSONS[0];
    setVideo(first);
    scrollToPage(first.target,first.page);
    document.querySelector('.lesson-btn')?.classList.add('active');
  });
  document.getElementById('bookOnlyBtn').addEventListener('click',()=>document.body.classList.toggle('book-only'));
  document.getElementById('askBtn').addEventListener('click',askCurrent);
  document.getElementById('sideAskBtn').addEventListener('click',askCurrent);
  document.getElementById('materialBtn').addEventListener('click',()=>alert('추가 자료 연결은 다음 단계에서 admin downloadUrl과 연결합니다.'));
  document.getElementById('answerBtn').addEventListener('click',()=>alert('답안 자료 연결은 다음 단계에서 answerUrl 필드와 연결합니다.'));
})();
</script>
</body>
</html>
