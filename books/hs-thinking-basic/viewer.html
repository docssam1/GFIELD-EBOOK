<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GFIELD E-BOOK</title>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
:root{--bg:#05070d;--line:rgba(255,255,255,.08);--gold:#e3c47b;--text:#f8fafc;--muted:#a8b0c3;--shadow:0 18px 60px rgba(0,0,0,.32)}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:linear-gradient(180deg,#04060b,#09101b 44%,#05070d);overflow:hidden}
.viewer-app{height:100%;display:grid;grid-template-rows:auto minmax(0,1fr)}
.viewer-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);background:rgba(7,11,20,.88);backdrop-filter:blur(12px)}
.viewer-brand{min-width:0}.brand-kicker{margin:0;color:var(--gold);font-size:11px;font-weight:1000;letter-spacing:.18em}.brand-title{margin:4px 0 0;font-size:clamp(18px,2vw,24px);font-weight:1000;letter-spacing:-.04em}
.viewer-tools{display:flex;align-items:center;gap:8px;overflow-x:auto}.tool-cluster{display:flex;align-items:center;gap:6px;padding:4px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025)}
.control-btn{border:0;padding:8px 10px;border-radius:10px;background:transparent;color:#d8e0ee;font-weight:850;font-size:13px;font-family:inherit;cursor:pointer}.control-btn:hover{background:rgba(255,255,255,.05)}
.page-arrow{width:38px;height:38px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#eef2ff;cursor:pointer;font-size:19px}.page-arrow:disabled{opacity:.28;cursor:default}.page-chip{min-width:80px;text-align:center;font-size:13px;font-weight:900;color:#fff5d8}
.viewer-stage{position:relative;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:14px;background:radial-gradient(circle at top left,rgba(35,84,147,.12),transparent 28%),radial-gradient(circle at bottom right,rgba(227,196,123,.07),transparent 24%)}
.spread{width:min(100%,920px);margin:0 auto}.page-shell{position:relative;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:#07101f;box-shadow:var(--shadow);overflow:hidden;min-height:min(88vh,1200px)}
.page-shell iframe{width:100%;height:min(88vh,1200px);border:0;display:block;background:#09101c;pointer-events:auto}
.stage-zone{position:fixed;top:50%;transform:translateY(-50%);width:54px;height:92px;z-index:8;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.34);font-size:34px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);backdrop-filter:blur(8px);border-radius:999px;cursor:pointer}.stage-zone.left{left:12px}.stage-zone.right{right:12px}.stage-zone.disabled{opacity:0;pointer-events:none}
.loading-screen,.error-screen{position:absolute;inset:0;display:grid;place-items:center;padding:24px;text-align:center;z-index:10;background:linear-gradient(180deg,rgba(6,10,18,.94),rgba(6,10,18,.98))}.loading-screen[hidden],.error-screen[hidden]{display:none}.status-card{max-width:520px;padding:26px 24px;border-radius:22px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(13,20,36,.94),rgba(9,14,24,.96));box-shadow:var(--shadow)}.status-card b{color:var(--gold);letter-spacing:.2em;font-size:12px}.status-card h2{margin:10px 0 0;font-size:28px}.status-card p{margin:12px 0 0;color:var(--muted);line-height:1.7}
.preload-frame{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;inset:-9999px auto auto -9999px}
@media(max-width:960px){.viewer-header{display:grid;grid-template-columns:1fr;gap:8px}.viewer-stage{padding:10px 8px 18px}.page-shell{border-radius:12px;min-height:calc(100vh - 120px)}.page-shell iframe{height:calc(100vh - 120px)}.stage-zone{width:44px;height:76px;font-size:30px}.stage-zone.left{left:6px}.stage-zone.right{right:6px}}
</style>
</head>
<body>
<div class="viewer-app">
<header class="viewer-header">
<div class="viewer-brand"><p class="brand-kicker">GFIELD-ON</p><h1 class="brand-title">GFIELD E-BOOK</h1></div>
<div class="viewer-tools">
<div class="tool-cluster">
<button class="control-btn" type="button" id="viewerAiBtn">에이독쌤</button>
<button class="control-btn" type="button" id="viewerPrintBtn">인쇄</button>
<button class="control-btn" type="button" id="viewerExitBtn">나가기</button>
</div>
<div class="tool-cluster">
<button class="page-arrow" type="button" id="prevBtn">‹</button>
<div class="page-chip" id="pageIndicator">1 / 1</div>
<button class="page-arrow" type="button" id="nextBtn">›</button>
</div>
</div>
</header>
<main class="viewer-stage" id="viewerStage">
<div class="loading-screen" id="loadingScreen"><div class="status-card"><b>LOADING</b><h2>교재 화면을 준비하고 있습니다.</h2><p>읽기 편한 E-BOOK 화면으로 불러오고 있습니다.</p></div></div>
<div class="error-screen" id="errorScreen" hidden><div class="status-card"><b>CHECK SOURCE</b><h2>교재 원본을 불러오지 못했습니다.</h2><p id="errorMessage">파일 경로 또는 원본 구조를 다시 확인해 주세요.</p></div></div>
<section class="spread" id="spread">
<div class="page-shell"><iframe id="leftFrame" title="교재 페이지"></iframe></div>
</section>
<button class="stage-zone left" id="leftZone">‹</button>
<button class="stage-zone right" id="rightZone">›</button>
<iframe class="preload-frame" id="loaderFrame"></iframe>
</main>
</div>
<script>
const params=new URLSearchParams(location.search);
const sourceUrl=params.get('source')||'./thinking-basic.html';
const initialPage=Math.max(1,parseInt(params.get('page')||'1',10)||1);
const storedStudentName=sessionStorage.getItem('gfield_student_name')||'';
const watermarkPrefix='G!FIELD';
const watermarkText=storedStudentName?`${watermarkPrefix} · ${storedStudentName}`:watermarkPrefix;
const sourceName=(sourceUrl.split('/').pop()||'').toLowerCase();
const leftFrame=document.getElementById('leftFrame');
const loaderFrame=document.getElementById('loaderFrame');
const loadingScreen=document.getElementById('loadingScreen');
const errorScreen=document.getElementById('errorScreen');
const errorMessage=document.getElementById('errorMessage');
const pageIndicator=document.getElementById('pageIndicator');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const leftZone=document.getElementById('leftZone');
const rightZone=document.getElementById('rightZone');
const viewerStage=document.getElementById('viewerStage');
let pageDocuments=[];let pageCount=0;let currentIndex=0;let touchStartX=0;let sourceHeadMarkup='';
function showError(message){loadingScreen.hidden=true;errorScreen.hidden=false;errorMessage.textContent=message}
function buildPageDocument(pageMarkup){return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">${sourceHeadMarkup}<style>html,body{margin:0;min-height:100%;overflow:auto;background:#09101c;-webkit-overflow-scrolling:touch}body{padding:14px 0 24px;position:relative}.student-watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-32deg);font-size:40px;font-weight:1000;letter-spacing:.04em;color:rgba(22,65,124,.12);white-space:nowrap;pointer-events:none;z-index:3}.page{margin:0 auto 24px!important;position:relative;z-index:2;max-width:100%!important}::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:999px}</style></head><body><div class="student-watermark">${watermarkText}</div>${pageMarkup}</body></html>`}
function setFrameContent(pageIndex){if(pageIndex<0||pageIndex>=pageDocuments.length){leftFrame.srcdoc='';return}leftFrame.srcdoc=pageDocuments[pageIndex]}
function updateNavState(){const atStart=currentIndex<=0;const atEnd=currentIndex>=pageCount-1;prevBtn.disabled=atStart;nextBtn.disabled=atEnd;leftZone.classList.toggle('disabled',atStart);rightZone.classList.toggle('disabled',atEnd);pageIndicator.textContent=`${currentIndex+1} / ${pageCount}`}
function renderPage(){setFrameContent(currentIndex);updateNavState();loadingScreen.hidden=true;viewerStage.scrollTop=0}
function goNext(){if(currentIndex>=pageCount-1)return;currentIndex++;renderPage()}
function goPrev(){if(currentIndex<=0)return;currentIndex--;renderPage()}
function handleTouchStart(e){touchStartX=e.changedTouches[0].clientX}
function handleTouchEnd(e){const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)<46)return;if(dx<0)goNext();else goPrev()}
prevBtn.addEventListener('click',goPrev);nextBtn.addEventListener('click',goNext);leftZone.addEventListener('click',goPrev);rightZone.addEventListener('click',goNext);
viewerStage.addEventListener('touchstart',handleTouchStart,{passive:true});viewerStage.addEventListener('touchend',handleTouchEnd,{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();if(e.key==='ArrowLeft')goPrev()});
document.getElementById('viewerPrintBtn').addEventListener('click',()=>window.print());
document.getElementById('viewerExitBtn').addEventListener('click',()=>{if(history.length>1){history.back();return}window.close()});
document.getElementById('viewerAiBtn').addEventListener('click',()=>alert('AI-DOC 질문 기능은 메인 화면과 연결됩니다.'));
loaderFrame.addEventListener('load',()=>{try{const doc=loaderFrame.contentDocument;if(!doc)throw new Error('loader no document');sourceHeadMarkup=[...doc.head.querySelectorAll('style,link[rel="stylesheet"]')].map(n=>n.outerHTML).join('\n');const pages=[...doc.querySelectorAll('.page')];pageDocuments=pages.map(p=>buildPageDocument(p.outerHTML));pageCount=pageDocuments.length;if(!pageCount)throw new Error('no pages found');currentIndex=Math.min(Math.max(0,initialPage-1),Math.max(0,pageCount-1));renderPage()}catch(e){showError('HTML 교재에서 페이지 구조를 읽지 못했습니다. `.page` 구성을 확인해 주세요.')}});
loaderFrame.src=sourceUrl;
</script>
</body>
</html>
