<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GFIELD-ON</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#02050b;color:white;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.box{text-align:center;padding:28px}b{color:#d4af37;letter-spacing:.2em}p{color:#cbd5e1}
</style>
</head>
<body>
<div class="box"><b>GFIELD-ON</b><h1>오프닝 화면을 불러오는 중입니다</h1><p>잠시만 기다려 주세요.</p></div>
<script>
(async function(){
  const css = `
<style id="gfield-mist-patch">
.login-flash{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:28px;background:radial-gradient(circle at center,rgba(13,22,38,.98),#02050b 100%);opacity:0;pointer-events:none;overflow:hidden;transition:opacity 1.2s cubic-bezier(.25,1,.5,1);will-change:opacity}.login-flash.show{opacity:1}.login-flash:before{content:"";position:absolute;inset:-18%;background:radial-gradient(circle at 30% 36%,rgba(248,221,131,.18),transparent 28%),radial-gradient(circle at 70% 44%,rgba(96,165,250,.12),transparent 34%),radial-gradient(circle at 50% 52%,rgba(255,255,255,.08),transparent 30%);opacity:.9;filter:blur(8px);transform:scale(1);transition:opacity 2.8s ease,transform 2.8s ease;will-change:opacity,transform}.login-flash.mist-out:before{opacity:.22;transform:scale(1.32)}.login-flash:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at center,rgba(248,221,131,.22),rgba(255,255,255,.16) 34%,transparent 72%);pointer-events:none;opacity:0;z-index:2;will-change:opacity}.login-flash.flash-hit:after{animation:flashDawnFlicker 2.1s cubic-bezier(.16,1,.3,1) forwards}@keyframes flashDawnFlicker{0%{opacity:.55}100%{opacity:0}}.flash-card{position:relative;z-index:3;width:min(1120px,calc(100% - 24px));padding:10px 20px;text-align:center;transform:translateY(14px) scale(.98);opacity:0;filter:blur(5px);transition:opacity 1.15s cubic-bezier(.16,1,.3,1),transform 1.15s cubic-bezier(.16,1,.3,1),filter 1.15s cubic-bezier(.16,1,.3,1);will-change:opacity,transform,filter}.login-flash.show .flash-card{transform:none;opacity:1;filter:blur(0)}.login-flash.mist-out .flash-card{opacity:.42;transform:translateY(-38px) scale(1.09);filter:blur(7px);transition:opacity 2.6s cubic-bezier(.25,1,.5,1),transform 2.6s cubic-bezier(.25,1,.5,1),filter 2.6s cubic-bezier(.25,1,.5,1)}.flash-message{margin:20px 0 0;color:#f8fafc;font-size:clamp(44px,7vw,90px);line-height:1.06;font-weight:1000;letter-spacing:-.075em;opacity:0;filter:blur(6px);transform:scale(1.02);text-shadow:0 12px 34px rgba(0,0,0,.4);animation:flashMessageFog 1.25s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.08s;will-change:opacity,transform,filter}.login-flash.mist-out .flash-message{animation:messageVapor 2.6s cubic-bezier(.25,1,.5,1) forwards}@keyframes flashMessageFog{to{opacity:1;filter:blur(0);transform:scale(1)}}@keyframes messageVapor{0%{opacity:1;letter-spacing:-.075em;transform:scale(1);filter:blur(0)}55%{opacity:.74;letter-spacing:-.025em;transform:scale(1.045);filter:blur(4px)}100%{opacity:.18;letter-spacing:.035em;transform:scale(1.1) translateY(-16px);filter:blur(8px)}}.flash-sub{margin:24px auto 0;max-width:780px;color:#f8dd83;font-size:clamp(21px,3vw,36px);line-height:1.35;font-weight:1000;letter-spacing:-.045em;opacity:0;transform:translateY(12px);filter:blur(4px);animation:flashSubRise 1s cubic-bezier(.16,1,.3,1) forwards;animation-delay:.62s;text-shadow:0 10px 30px rgba(0,0,0,.42);will-change:opacity,transform,filter}.login-flash.mist-out .flash-sub{opacity:.25;transform:translateY(-18px) scale(1.04);filter:blur(8px);transition:opacity 2.4s ease,transform 2.4s ease,filter 2.4s ease}@keyframes flashSubRise{to{opacity:1;transform:none;filter:none}}.glow-particle{position:absolute;left:50%;top:50%;width:6px;height:6px;background:radial-gradient(circle,#fff 20%,#f8dd83 60%,rgba(212,175,55,0) 100%);border-radius:50%;box-shadow:0 0 12px 2px rgba(248,221,131,.42);pointer-events:none;opacity:0;z-index:10;will-change:transform,opacity}.login-flash.mist-out .gp-1{animation:vaporGlow1 2.9s cubic-bezier(.2,.9,.2,1) forwards}.login-flash.mist-out .gp-2{animation:vaporGlow2 3.05s cubic-bezier(.2,.9,.2,1) .1s forwards}.login-flash.mist-out .gp-3{animation:vaporGlow3 2.95s cubic-bezier(.2,.9,.2,1) .2s forwards}.login-flash.mist-out .gp-4{animation:vaporGlow4 3.1s cubic-bezier(.2,.9,.2,1) .06s forwards}.login-flash.mist-out .gp-5{animation:vaporGlow5 3.15s cubic-bezier(.2,.9,.2,1) .16s forwards}.login-flash.mist-out .gp-6{animation:vaporGlow6 3.0s cubic-bezier(.2,.9,.2,1) .24s forwards}.login-flash.mist-out .gp-7{animation:vaporGlow7 3.18s cubic-bezier(.2,.9,.2,1) .12s forwards}.login-flash.mist-out .gp-8{animation:vaporGlow8 3.25s cubic-bezier(.2,.9,.2,1) .28s forwards}@keyframes vaporGlow1{0%{transform:translate(-60px,20px) scale(.5);opacity:0}20%{transform:translate(-120px,-28px) scale(1);opacity:.82}72%{transform:translate(130px,-84px) scale(.75);opacity:.55}100%{transform:translate(calc(50vw - 120px),calc(-50vh + 50px)) scale(.18);opacity:0}}@keyframes vaporGlow2{0%{transform:translate(28px,-20px) scale(.5);opacity:0}20%{transform:translate(104px,-62px) scale(.9);opacity:.7}72%{transform:translate(178px,-102px) scale(.7);opacity:.5}100%{transform:translate(calc(50vw - 90px),calc(-50vh + 35px)) scale(.18);opacity:0}}@keyframes vaporGlow3{0%{transform:translate(-10px,-12px) scale(.45);opacity:0}22%{transform:translate(-80px,-100px) scale(.85);opacity:.78}72%{transform:translate(92px,-120px) scale(.65);opacity:.48}100%{transform:translate(calc(50vw - 110px),calc(-50vh + 45px)) scale(.18);opacity:0}}@keyframes vaporGlow4{0%{transform:translate(36px,24px) scale(.5);opacity:0}20%{transform:translate(132px,48px) scale(.9);opacity:.66}72%{transform:translate(204px,-38px) scale(.7);opacity:.42}100%{transform:translate(calc(50vw - 100px),calc(-50vh + 30px)) scale(.18);opacity:0}}@keyframes vaporGlow5{0%{transform:translate(-32px,-38px) scale(.5);opacity:0}20%{transform:translate(-152px,-72px) scale(.9);opacity:.74}72%{transform:translate(70px,-142px) scale(.7);opacity:.45}100%{transform:translate(calc(50vw - 80px),calc(-50vh + 40px)) scale(.18);opacity:0}}@keyframes vaporGlow6{0%{transform:translate(8px,38px) scale(.5);opacity:0}20%{transform:translate(-86px,90px) scale(.9);opacity:.62}72%{transform:translate(112px,12px) scale(.68);opacity:.42}100%{transform:translate(calc(50vw - 116px),calc(-50vh + 42px)) scale(.18);opacity:0}}@keyframes vaporGlow7{0%{transform:translate(70px,2px) scale(.5);opacity:0}20%{transform:translate(150px,8px) scale(.9);opacity:.68}72%{transform:translate(216px,-72px) scale(.68);opacity:.44}100%{transform:translate(calc(50vw - 96px),calc(-50vh + 48px)) scale(.18);opacity:0}}@keyframes vaporGlow8{0%{transform:translate(-76px,-4px) scale(.5);opacity:0}20%{transform:translate(-176px,14px) scale(.9);opacity:.66}72%{transform:translate(62px,-52px) scale(.68);opacity:.42}100%{transform:translate(calc(50vw - 104px),calc(-50vh + 34px)) scale(.18);opacity:0}}@keyframes dockGatherIn{0%{opacity:0;transform:translate(-60px,30px) scale(.9);filter:blur(4px)}65%{opacity:1;transform:translate(2px,-1px) scale(1.01);filter:blur(.5px)}100%{opacity:1;transform:none;filter:blur(0)}}@media (prefers-reduced-motion:reduce){.login-flash,.flash-card,.flash-message,.flash-sub,.glow-particle{animation:none!important;transition:none!important;filter:none!important}}
</style>`;
  const js = `
<script id="gfield-mist-patch-script">
(function(){
  window.playLoginGreeting=function(name){
    const tone=getGreetingTone(name);
    const flash=document.getElementById('loginFlash');
    const dock=document.getElementById('dockHello');
    const flashMessage=document.getElementById('flashMessage');
    const flashSub=document.getElementById('flashSub');
    document.querySelectorAll('.glow-particle').forEach(el=>el.remove());
    for(let i=1;i<=8;i++){const p=document.createElement('div');p.className='glow-particle gp-'+i;flash.appendChild(p)}
    flash.classList.remove('show','mist-out','flash-hit');
    dock.classList.remove('show','gather-in');
    flashMessage.textContent=tone.flash;
    flashSub.textContent='자, 이제 GFIELD-ON 시작해볼까?';
    flash.classList.add('show','flash-hit');
    setTimeout(()=>flash.classList.add('mist-out'),2100);
    setTimeout(()=>document.getElementById('ebookViewerSection')?.scrollIntoView({behavior:'smooth',block:'start'}),5200);
    setTimeout(()=>{
      flash.classList.remove('show','mist-out');
      dock.classList.add('show','gather-in');
      typeDockText((name||'').trim());
      document.querySelectorAll('.glow-particle').forEach(el=>el.remove());
    },6200);
    setTimeout(()=>flash.classList.remove('flash-hit'),6600);
  };
})();
<\/script>`;
  try{
    const res=await fetch('./gfield-on-archive-preview.html?v='+Date.now(),{cache:'no-store'});
    let html=await res.text();
    html=html.replace('</head>',css+'</head>').replace('</body>',js+'</body>');
    document.open();document.write(html);document.close();
  }catch(e){location.replace('./gfield-on-archive-preview.html')}
})();
</script>
</body>
</html>
