<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G-FIELD THINKING BASIC Library</title>
  <script src="config.js"></script>
  <script src="students.js"></script>
  <style>
    :root{
      --g-blue:#16417c;
      --g-blue2:#0d2b55;
      --g-gold:#eac996;
      --g-orange:#d97706;
      --g-ink:#0f172a;
      --g-muted:#64748b;
      --g-line:rgba(22,65,124,.14);
      --g-bg:#eef3f8;
    }
    *{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    html{scroll-behavior:smooth}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--g-ink);background:linear-gradient(135deg,#f4f7fb 0%,#e7eef8 48%,#f8fafc 100%);user-select:none;-webkit-user-select:none;overscroll-behavior:none}
    body:not(.authorized) #studentApp{display:none}
    body.authorized #studentApp{display:flex;flex-direction:column;min-height:100vh}
    #accessGate{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;padding:26px;color:#fff;background:linear-gradient(145deg,#102847 0%,#16417c 54%,#0a172e 100%)}
    body.authorized #accessGate{display:none!important}
    .gate-card{position:relative;width:min(470px,94vw);overflow:hidden;border-radius:28px;background:rgba(255,255,255,.96);color:var(--g-ink);box-shadow:0 28px 90px rgba(0,0,0,.36);border:1px solid rgba(255,255,255,.72)}
    .gate-card:before{content:"";position:absolute;inset:0 0 auto;height:9px;background:linear-gradient(90deg,#0ea5e9,#7c3aed,#e11d48,#f59e0b,#22c55e)}
    .gate-inner{padding:35px 30px 28px;text-align:center}
    .gate-logo-img{display:block;width:210px;max-width:70%;height:auto;object-fit:contain;margin:0 auto 10px}
    .gate-kicker{font-size:12px;font-weight:950;letter-spacing:2.4px;color:var(--g-orange)}
    .gate-title{margin:10px 0 8px;font-size:23px;font-weight:950;color:#111827}
    .gate-desc{margin:0 auto 20px;color:#526071;font-size:14px;line-height:1.62;word-break:keep-all}
    .gate-form{display:grid;gap:10px}
    #studentNameInput{width:100%;height:52px;border:2px solid #d7dee9;border-radius:16px;padding:0 16px;text-align:center;outline:none;font-size:19px;font-weight:900;background:#fff}
    #studentNameInput:focus{border-color:var(--g-blue);box-shadow:0 0 0 5px rgba(22,65,124,.11)}
    .gate-button{height:52px;border:0;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#16417c,#283fa6 58%,#7c3aed);color:#fff;font-size:16px;font-weight:950;box-shadow:0 12px 28px rgba(22,65,124,.28)}
    .gate-error{min-height:22px;color:#dc2626;font-size:13px;font-weight:900}
    .security-note{margin-top:12px;color:#8b95a5;font-size:11.5px;font-weight:700;line-height:1.45}
    .premium-header{position:sticky;top:0;z-index:9000;padding:12px 18px 10px;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(22,65,124,.13);box-shadow:0 12px 34px rgba(15,23,42,.08)}
    .header-grid{max-width:1480px;margin:0 auto;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center}
    .brand-cluster{display:flex;align-items:center;gap:14px;min-width:260px}
    .brand-logo{width:164px;height:auto;display:block;object-fit:contain;filter:drop-shadow(0 5px 9px rgba(15,23,42,.12))}
    .consult-pill{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(22,65,124,.18);border-radius:999px;color:var(--g-blue);background:#f5f8fc;padding:8px 12px;font-size:12px;font-weight:950;white-space:nowrap}
    .hero-copy{text-align:right;min-width:0}
    .slogan{font-size:clamp(15px,1.55vw,24px);font-weight:950;color:var(--g-blue2)}
    .subline{margin-top:3px;font-size:clamp(12px,1vw,16px);color:#334155;font-weight:850}
    .student-name{color:#7c2d12;background:#fff7ed;padding:2px 8px;border-radius:999px;border:1px solid #fed7aa}
    .header-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}
    .top-button{border:1px solid rgba(22,65,124,.16);border-radius:12px;cursor:pointer;padding:10px 13px;background:#fff;color:var(--g-blue);font-size:12.5px;font-weight:950;white-space:nowrap;box-shadow:0 4px 12px rgba(15,23,42,.06)}
    .top-button.primary{color:#fff;border:0;background:linear-gradient(135deg,#16417c,#7c3aed)}
    .viewer-main{width:min(1480px,calc(100vw - 28px));margin:14px auto 24px;display:flex;flex-direction:column;gap:12px}
    .viewer-menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(116px,1fr));gap:8px;padding:10px;background:rgba(255,255,255,.78);border:1px solid var(--g-line);border-radius:20px;box-shadow:0 12px 30px rgba(15,23,42,.08)}
    .lesson-button{min-height:48px;border:1px solid rgba(22,65,124,.13);border-radius:14px;background:#fff;color:#16243b;cursor:pointer;font-weight:950;font-size:13px;line-height:1.25;padding:9px 8px;box-shadow:0 5px 14px rgba(15,23,42,.06);transition:transform .14s ease,box-shadow .14s ease,background .14s ease}
    .lesson-button:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,23,42,.10)}
    .lesson-button.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,#16417c,#2a3ca6 58%,#7c3aed)}
    .lesson-button.concept:not(.active){background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .lesson-button.utility:not(.active){background:#f1f5f9;color:#334155}
    .study-shell{display:grid;grid-template-columns:minmax(430px,.92fr) minmax(520px,1.08fr);gap:14px;min-height:calc(100vh - 202px)}
    .video-pane,.book-pane{border-radius:22px;background:rgba(255,255,255,.86);border:1px solid var(--g-line);box-shadow:0 18px 38px rgba(15,23,42,.10);overflow:hidden}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;background:linear-gradient(135deg,rgba(22,65,124,.98),rgba(20,44,92,.96));color:#fff}
    .panel-title{font-size:15px;font-weight:950;word-break:keep-all}
    .panel-meta{font-size:11.5px;font-weight:850;opacity:.78}
    .video-frame-box{position:relative;width:100%;aspect-ratio:16/9;background:#0b1020}
    #lessonVideoFrame{position:absolute;inset:0;width:100%;height:100%;border:0}
    .video-caption{padding:14px 16px 16px;color:#334155;font-size:13px;line-height:1.62;font-weight:700;word-break:keep-all;background:linear-gradient(180deg,#fff,#f8fafc)}
    .video-caption b{color:var(--g-blue)}
    .book-pane{height:calc(100vh - 202px);overflow:auto;padding:14px 10px 30px;background:linear-gradient(180deg,rgba(236,242,249,.9),rgba(255,255,255,.9));scrollbar-gutter:stable both-edges}
    .pdf-status{padding:28px;text-align:center;font-weight:900;color:var(--g-blue);line-height:1.65;word-break:keep-all}
    .pdf-page{position:relative;width:max-content;max-width:100%;margin:0 auto 22px;box-shadow:0 12px 34px rgba(15,23,42,.18);background:#fff}
    .pdf-page canvas{display:block;width:100%;height:auto}
    .student-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-34deg);font-size:46pt;font-weight:950;color:rgba(22,65,124,.14);white-space:nowrap;letter-spacing:1px;z-index:2;pointer-events:none;user-select:none;mix-blend-mode:multiply}
    .student-watermark .wm-print-row{display:none}
    .student-watermark .wm-main{display:inline-block}
    .security-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000000;display:none;padding:11px 15px;border-radius:999px;background:rgba(15,23,42,.92);color:#fff;font-size:12px;font-weight:900;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    .security-toast.show{display:block}
    .rotate-hint{display:none;position:fixed;inset:0;z-index:1000001;background:linear-gradient(135deg,#102847,#16417c);color:#fff;align-items:center;justify-content:center;text-align:center;padding:30px}
    .rotate-hint .box{max-width:330px;line-height:1.65;font-weight:850}
    .rotate-hint strong{display:block;font-size:22px;margin-bottom:8px}
    #studentApp.cinema-mode .viewer-main{display:grid;grid-template-columns:186px minmax(0,1fr);gap:14px;align-items:start}
    #studentApp.cinema-mode .viewer-menu{position:sticky;top:104px;grid-template-columns:1fr;align-self:start;max-height:calc(100vh - 122px);overflow:auto}
    #studentApp.cinema-mode .study-shell{grid-template-columns:1fr;min-height:calc(100vh - 122px)}
    #studentApp.cinema-mode .book-pane{display:none!important}
    #studentApp.cinema-mode .video-pane{min-height:calc(100vh - 122px)}
    @media (max-width:1100px){
      .header-grid{grid-template-columns:1fr;gap:8px;text-align:center}
      .brand-cluster,.header-actions{justify-content:center}
      .hero-copy{text-align:center}
      .study-shell{grid-template-columns:1fr 1fr}
    }
    @media (max-width:860px) and (orientation:portrait){body.authorized .rotate-hint{display:flex}}
    @media (max-width:980px) and (orientation:landscape){
      .premium-header{padding:7px 10px}
      .brand-logo{width:110px}
      .consult-pill{display:none}
      .slogan{font-size:14px}
      .subline{font-size:12px}
      .viewer-main{width:calc(100vw - 16px);margin-top:8px}
      .viewer-menu{grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;padding:7px;overflow-x:auto}
      .lesson-button{min-height:40px;font-size:11.5px;padding:7px 6px}
      .study-shell{grid-template-columns:1fr 1fr;gap:8px;min-height:calc(100vh - 134px)}
      .video-pane,.book-pane{border-radius:16px}
      .book-pane{height:calc(100vh - 134px)}
    }
    @media print{
      body{background:#fff!important;padding:0!important;display:block!important}
      #accessGate,.premium-header,.viewer-menu,.video-pane,.rotate-hint,.security-toast,.no-print{display:none!important}
      #studentApp,.viewer-main,.study-shell,.book-pane{display:block!important;width:auto!important;height:auto!important;min-height:0!important;margin:0!important;padding:0!important;overflow:visible!important;background:#fff!important;border:0!important;box-shadow:none!important}
      .pdf-page{width:210mm!important;max-width:210mm!important;margin:0!important;box-shadow:none!important;page-break-after:always!important;overflow:hidden!important}
      .student-watermark{position:absolute!important;inset:0!important;top:0!important;left:0!important;right:0!important;bottom:0!important;transform:none!important;color:rgba(22,65,124,.18)!important;font-size:39pt!important;line-height:1!important;z-index:2!important;mix-blend-mode:multiply!important}
      .student-watermark .wm-main{display:none!important}
      .student-watermark .wm-print-row{display:block!important;position:absolute!important;left:50%!important;transform:translate(-50%,-50%) rotate(-34deg)!important;white-space:nowrap!important;font-weight:950!important;letter-spacing:1px!important}
      .student-watermark .wm-r1{top:26%!important}
      .student-watermark .wm-r2{top:50%!important}
      .student-watermark .wm-r3{top:74%!important}
    }
  </style>
</head>
<body>
  <div id="accessGate" class="no-print">
    <div class="gate-card">
      <div class="gate-inner">
        <img class="gate-logo-img" src="gfield-logo.svg" alt="G-FIELD 지필드 영재교육 로고">
        <div class="gate-kicker">SMART LIBRARY ACCESS</div>
        <div class="gate-title" id="gateTitle">교재 학생 인증</div>
        <p class="gate-desc">승인된 학생 이름을 입력하면 개념 강의와 PDF 교재 뷰어가 열립니다.<br>입력한 이름은 인쇄 워터마크로 사용됩니다.</p>
        <div class="gate-form">
          <input id="studentNameInput" type="text" autocomplete="off" inputmode="text" placeholder="학생 이름 입력">
          <button class="gate-button" type="button" onclick="GFieldAccess.login()">프리미엄 개념 강의 입장</button>
        </div>
        <div id="gateError" class="gate-error"></div>
        <div class="security-note">승인 명단은 students.js에서 관리합니다. 이름 목록 또는 해시 목록 방식으로 바꿀 수 있습니다.</div>
      </div>
    </div>
  </div>
  <div class="rotate-hint no-print"><div class="box"><strong>모바일은 가로보기 권장</strong>영상과 교재를 동시에 보기 위해 휴대폰을 가로로 돌려 주세요.</div></div>
  <div id="securityToast" class="security-toast no-print">보안 보호가 적용된 학생 전용 자료입니다.</div>

  <script type="module">
    import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";

    const CONFIG = window.GFIELD_CONFIG || {};
    const STUDENTS = window.GFIELD_STUDENTS || {};
    const LESSONS = Array.isArray(CONFIG.lessons) ? CONFIG.lessons : [];
    const APP_SALT = STUDENTS.salt || "gfield-thinking-basic-2026";
    const APPROVED_HASHES = new Set(STUDENTS.approvedHashes || []);
    const APPROVED_NAMES = new Set((STUDENTS.approvedNames || []).map(normalizeName));
    const BOOK_URL = CONFIG.bookPdf || "assets/book.pdf";
    const BOOK_TITLE = CONFIG.bookTitle || "THINKING BASIC";
    const LINK_BUTTONS = Array.isArray(CONFIG.links) ? CONFIG.links : [];
    let activeLessonKey = LESSONS[0]?.id || "";
    let studentDisplayName = "";
    let pdfDoc = null;
    let pdfLoading = null;
    let renderStarted = false;

    function normalizeName(v){return String(v||"").normalize("NFC").replace(/\s+/g,"").trim().toUpperCase()}
    function displayName(v){return String(v||"").normalize("NFC").replace(/\s+/g,"").trim()}
    function utf8Bytes(s){return new TextEncoder().encode(s)}
    async function sha256Hex(message){
      const d = await crypto.subtle.digest("SHA-256", utf8Bytes(message));
      return Array.from(new Uint8Array(d)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    async function isApprovedName(name){
      const key = normalizeName(name);
      if(!key)return false;
      if(APPROVED_NAMES.has(key))return true;
      return APPROVED_HASHES.has(await sha256Hex(APP_SALT + ":" + key));
    }
    function showSecurityToast(){
      const t=document.getElementById("securityToast");
      if(!t)return;
      t.classList.add("show");
      clearTimeout(showSecurityToast.timer);
      showSecurityToast.timer=setTimeout(()=>t.classList.remove("show"),1600);
    }
    function installSecurityGuards(){
      document.addEventListener("contextmenu",e=>{e.preventDefault();showSecurityToast()});
      document.addEventListener("copy",e=>{e.preventDefault();showSecurityToast()});
      document.addEventListener("cut",e=>{e.preventDefault();showSecurityToast()});
      document.addEventListener("dragstart",e=>e.preventDefault());
      document.addEventListener("keydown",e=>{
        const k=String(e.key||"").toLowerCase();
        const blocked=k==="f12" || (e.ctrlKey&&k==="u") || (e.ctrlKey&&k==="s") || (e.ctrlKey&&e.shiftKey&&["i","j","c"].includes(k));
        if(blocked){e.preventDefault();e.stopPropagation();showSecurityToast()}
      },true);
    }
    function toEmbedUrl(url){
      try{
        const p=new URL(url);
        let id="";
        if(p.hostname.includes("youtu.be"))id=p.pathname.replace(/^\//,"");
        else if(p.hostname.includes("youtube.com"))id=p.searchParams.get("v")||"";
        let start=p.searchParams.get("t")||p.searchParams.get("start")||"",sec=0;
        if(/^\d+$/.test(start))sec=Number(start);
        else{
          const m=String(start).match(/(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?/i);
          if(m)sec=Number(m[1]||0)*3600+Number(m[2]||0)*60+Number(m[3]||0);
        }
        return id ? "https://www.youtube.com/embed/"+encodeURIComponent(id)+"?rel=0&modestbranding=1&playsinline=1"+(sec?"&start="+sec:"") : url;
      }catch(e){return url}
    }
    function makeButton(item){
      const btn=document.createElement("button");
      btn.className="lesson-button " + (item.kind || "");
      btn.type="button";
      btn.dataset.lesson=item.id;
      btn.textContent=item.label || item.title || item.id;
      btn.addEventListener("click",()=>selectLesson(item.id,true));
      return btn;
    }
    function makeLinkButton(item){
      const btn=document.createElement("button");
      btn.className="lesson-button utility";
      btn.type="button";
      btn.textContent=item.label || item.title || "링크";
      btn.addEventListener("click",()=>{
        if(item.url)window.open(item.url,"_blank","noopener");
      });
      return btn;
    }
    function buildAppShell(){
      if(document.getElementById("studentApp"))return;
      document.title = "G-FIELD " + BOOK_TITLE + " Library";
      const gateTitle=document.getElementById("gateTitle");
      if(gateTitle)gateTitle.textContent = BOOK_TITLE + " 학생 인증";
      const app=document.createElement("div");
      app.id="studentApp";
      app.innerHTML = `
        <header class="premium-header no-print">
          <div class="header-grid">
            <div class="brand-cluster"><img class="brand-logo" src="gfield-logo.svg" alt="G-FIELD 지필드 영재교육 로고"><span class="consult-pill">상담 안내</span></div>
            <div class="hero-copy">
              <div class="slogan">${CONFIG.slogan || "성공하는 공부 습관을 만드는 지필드 영재교육"}</div>
              <div class="subline">${CONFIG.subtitle || BOOK_TITLE + " 프리미엄 개념 강의"} <span class="student-name" id="headerStudentName">학생</span></div>
            </div>
            <div class="header-actions">
              <button class="top-button" type="button" onclick="window.print()">인쇄하기</button>
              <button id="cinemaToggleTop" class="top-button primary" type="button">큰 화면으로 보기</button>
            </div>
          </div>
        </header>
        <main class="viewer-main no-print">
          <nav class="viewer-menu" id="lessonMenu" aria-label="${BOOK_TITLE} 강의 메뉴"></nav>
          <section class="study-shell">
            <section class="video-pane">
              <div class="panel-head">
                <div><div class="panel-title" id="videoPanelTitle"></div><div class="panel-meta" id="videoPanelMeta"></div></div>
                <button id="openYouTube" class="top-button" type="button">새 창</button>
              </div>
              <div class="video-frame-box"><iframe id="lessonVideoFrame" title="G-FIELD 개념 강의" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>
              <div class="video-caption"><b>학습 순서:</b> 영상을 보고, 오른쪽 PDF 교재의 연결된 쪽을 바로 풀어 보세요. 강의 버튼, 링크 버튼, 쪽수는 config.js에서 바꿀 수 있습니다.</div>
            </section>
            <section id="bookPane" class="book-pane" aria-label="${BOOK_TITLE} PDF 교재 영역"><div class="pdf-status">PDF 교재를 불러오는 중입니다...</div></section>
          </section>
        </main>`;
      document.body.appendChild(app);

      const menu=app.querySelector("#lessonMenu");
      if(LESSONS.length){
        LESSONS.forEach(item=>menu.appendChild(makeButton(item)));
      }else{
        menu.innerHTML = '<div class="pdf-status">config.js에 강의 목록을 추가해 주세요.</div>';
      }
      LINK_BUTTONS.forEach(item=>menu.appendChild(makeLinkButton(item)));
      const full=document.createElement("button");
      full.className="lesson-button utility";
      full.type="button";
      full.id="cinemaToggleMenu";
      full.textContent="큰 화면으로 보기";
      full.addEventListener("click",toggleCinemaMode);
      menu.appendChild(full);
      document.getElementById("cinemaToggleTop").addEventListener("click",toggleCinemaMode);
      document.getElementById("openYouTube").addEventListener("click",()=>{
        const item=currentLesson();
        if(item?.videoUrl)window.open(item.videoUrl,"_blank","noopener");
      });
    }
    function currentLesson(){return LESSONS.find(item=>item.id===activeLessonKey) || LESSONS[0]}
    function selectLesson(key,doScroll){
      activeLessonKey=key;
      const item=currentLesson();
      if(!item)return;
      document.querySelectorAll(".lesson-button[data-lesson]").forEach(btn=>btn.classList.toggle("active",btn.dataset.lesson===item.id));
      document.getElementById("videoPanelTitle").textContent=item.title || item.label || "";
      document.getElementById("videoPanelMeta").textContent=item.page ? "교재 " + item.page + "쪽으로 자동 이동" : "교재 연결 쪽 없음";
      document.getElementById("lessonVideoFrame").src=toEmbedUrl(item.videoUrl || "");
      if(doScroll && item.page)setTimeout(()=>scrollToBookPage(item.page),250);
    }
    function toggleCinemaMode(){
      const app=document.getElementById("studentApp");
      if(!app)return;
      app.classList.toggle("cinema-mode");
      const on=app.classList.contains("cinema-mode");
      [document.getElementById("cinemaToggleTop"),document.getElementById("cinemaToggleMenu")].forEach(btn=>{if(btn)btn.textContent=on?"교재 함께 보기":"큰 화면으로 보기"});
    }
    async function ensurePdfLoaded(){
      if(pdfDoc)return pdfDoc;
      if(pdfLoading)return pdfLoading;
      pdfLoading=(async()=>{
        const pane=document.getElementById("bookPane");
        try{
          const task=pdfjsLib.getDocument({url:BOOK_URL});
          pdfDoc=await task.promise;
          pane.innerHTML="";
          await renderPdfPages(pane);
          return pdfDoc;
        }catch(e){
          pane.innerHTML = `<div class="pdf-status">PDF 파일을 찾을 수 없습니다.<br>교재 PDF를 <b>${BOOK_URL}</b> 위치에 넣고 GitHub에 폴더째 업로드해 주세요.</div>`;
          throw e;
        }
      })();
      return pdfLoading;
    }
    async function renderPdfPages(pane){
      if(renderStarted)return;
      renderStarted=true;
      const baseScale = Number(CONFIG.pdfScale || 1.35);
      for(let pageNumber=1; pageNumber<=pdfDoc.numPages; pageNumber++){
        const page=await pdfDoc.getPage(pageNumber);
        const viewport=page.getViewport({scale:baseScale});
        const wrap=document.createElement("div");
        wrap.className="pdf-page";
        wrap.dataset.bookPage=String(pageNumber);
        wrap.style.width=viewport.width + "px";
        const canvas=document.createElement("canvas");
        const outputScale=window.devicePixelRatio || 1;
        canvas.width=Math.floor(viewport.width * outputScale);
        canvas.height=Math.floor(viewport.height * outputScale);
        canvas.style.width=viewport.width + "px";
        canvas.style.height=viewport.height + "px";
        const ctx=canvas.getContext("2d");
        const transform=outputScale !== 1 ? [outputScale,0,0,outputScale,0,0] : null;
        wrap.appendChild(canvas);
        wrap.appendChild(makeWatermark());
        pane.appendChild(wrap);
        await page.render({canvasContext:ctx, viewport, transform}).promise;
      }
    }
    function makeWatermark(){
      const w=document.createElement("div");
      w.className="student-watermark";
      setWatermarkContent(w);
      return w;
    }
    function watermarkText(){
      const prefix = CONFIG.watermarkPrefix || "G!FIELD";
      return prefix + " · " + studentDisplayName;
    }
    function setWatermarkContent(w){
      const text = watermarkText();
      w.innerHTML = "";
      const main=document.createElement("span");
      main.className="wm-main";
      main.textContent=text;
      w.appendChild(main);
      ["wm-r1","wm-r2","wm-r3"].forEach(cls=>{
        const row=document.createElement("span");
        row.className="wm-print-row " + cls;
        row.textContent=text;
        w.appendChild(row);
      });
    }
    function updateWatermarks(){
      document.querySelectorAll(".student-watermark").forEach(setWatermarkContent);
    }
    function scrollToBookPage(n){
      const pane=document.getElementById("bookPane");
      const page=pane?.querySelector(`.pdf-page[data-book-page="${String(n)}"]`);
      if(page)pane.scrollTo({top:Math.max(0,page.offsetTop-14),behavior:"smooth"});
    }
    async function authorize(name){
      studentDisplayName=name;
      buildAppShell();
      document.body.classList.add("authorized");
      const nameEl=document.getElementById("headerStudentName");
      if(nameEl)nameEl.textContent=name+" 학생";
      sessionStorage.setItem("gfield_thinking_basic_student",name);
      selectLesson(activeLessonKey,false);
      try{
        await ensurePdfLoaded();
        updateWatermarks();
        const item=currentLesson();
        if(item?.page)scrollToBookPage(item.page);
      }catch(e){}
    }

    window.GFieldAccess = {
      async login(){
        const input=document.getElementById("studentNameInput");
        const error=document.getElementById("gateError");
        const name=displayName(input.value);
        if(!name){error.textContent="학생 이름을 입력해 주세요.";input.focus();return}
        error.textContent="승인 확인 중입니다...";
        try{
          const ok=await isApprovedName(name);
          if(!ok){error.textContent="승인 명단에 없는 이름입니다. 이름을 다시 확인해 주세요.";input.focus();input.select();return}
          error.textContent="";
          await authorize(name);
        }catch(e){
          error.textContent=e.message || "승인 확인 중 오류가 발생했습니다. 새로고침 후 다시 시도해 주세요.";
        }
      }
    };

    document.addEventListener("DOMContentLoaded",()=>{
      installSecurityGuards();
      buildAppShell();
      const input=document.getElementById("studentNameInput");
      if(input){
        input.addEventListener("keydown",e=>{if(e.key==="Enter")window.GFieldAccess.login()});
        setTimeout(()=>input.focus(),60);
      }
      const saved=sessionStorage.getItem("gfield_thinking_basic_student");
      if(saved)isApprovedName(saved).then(ok=>{if(ok)authorize(saved);else sessionStorage.removeItem("gfield_thinking_basic_student")});
    });
  </script>
</body>
</html>
