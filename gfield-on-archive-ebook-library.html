<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GFIELD-ON Smart eBook · 서재</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{extend:{colors:{"primary":"#e9c176","primary-container":"#c5a059","background":"#0f141a","surface-container-low":"#1e1b16","surface-container":"#231f1a","surface-container-high":"#2d2924","surface-container-lowest":"#110e09","surface-variant":"#38342e","on-surface":"#e9e1d8","on-surface-variant":"#d1c5b4","outline-variant":"#4e4639","outline":"#9a8f80","secondary-container":"#0566d9","secondary":"#adc6ff"},fontFamily:{"display":["Playfair Display"],"body":["Inter"]}}}
  }
</script>
<style>
  .mat-sym{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
  .mat-fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}
  .gold-gradient{background:linear-gradient(135deg,#c5a059 0%,#e9c176 50%,#c5a059 100%)}
  .book-scene{perspective:1200px}
  .book-container{position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.2,1);transform:rotateY(-10deg) rotateX(5deg)}
  .book-wrapper:hover .book-container{transform:translateY(-16px) rotateY(-22deg) rotateX(10deg) scale(1.04)}
  .book-wrapper.selected .book-container{transform:translateY(-16px) rotateY(-22deg) rotateX(10deg) scale(1.06)}
  .book-front{transform:translateZ(15px);box-shadow:inset 4px 0 10px rgba(0,0,0,.5);overflow:hidden}
  .book-container::before{content:'';position:absolute;top:0;left:0;width:28px;height:100%;transform-origin:left;transform:rotateY(-90deg);background:linear-gradient(90deg,#111,#222 20%,#111 80%,#0a0a0a)}
  .book-container::after{content:'';position:absolute;top:1%;right:-26px;width:26px;height:98%;transform-origin:left;transform:translateZ(-15px) rotateY(90deg);background:#d4c5b0;background-image:repeating-linear-gradient(0deg,#d4c5b0,#d4c5b0 1px,#c0b098 2px)}
  .book-shadow{position:absolute;bottom:-6px;left:5%;width:90%;height:18px;box-shadow:0 16px 26px rgba(0,0,0,.85);transform:translateZ(-18px);transition:all .6s cubic-bezier(.2,.8,.2,1)}
  .book-wrapper:hover .book-shadow,.book-wrapper.selected .book-shadow{bottom:-22px;transform:translateZ(-18px) scale(1.06)}
  .detail-panel{display:none;grid-template-columns:5fr 7fr;background:linear-gradient(135deg,#110e09,#1e1b16);border-top:1px solid rgba(78,70,57,.5);border-bottom:1px solid rgba(78,70,57,.5)}
  .detail-panel.open{display:grid}
  @keyframes detailIn{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  .detail-panel.open{animation:detailIn .4s cubic-bezier(.2,.8,.2,1) forwards}
  .detail-book-scene{perspective:1500px}
  .detail-book-container{position:relative;transform-style:preserve-3d;animation:floatBook 5s ease-in-out infinite}
  @keyframes floatBook{0%,100%{transform:rotateY(-10deg) rotateX(5deg) translateY(0)}50%{transform:rotateY(-14deg) rotateX(8deg) translateY(-14px)}}
  .detail-book-front{transform:translateZ(15px);box-shadow:inset 4px 0 12px rgba(0,0,0,.6),0 30px 60px rgba(0,0,0,.7)}
  .detail-book-container::before{content:'';position:absolute;top:0;left:0;width:32px;height:100%;transform-origin:left;transform:rotateY(-90deg);background:linear-gradient(90deg,#111,#222 20%,#111 80%,#0a0a0a)}
  .detail-book-container::after{content:'';position:absolute;top:1%;right:-30px;width:30px;height:98%;transform-origin:left;transform:translateZ(-15px) rotateY(90deg);background:#d4c5b0;background-image:repeating-linear-gradient(0deg,#d4c5b0,#d4c5b0 1px,#c0b098 2px)}
  .glow-gold{box-shadow:0 0 20px rgba(233,193,118,.15);transition:box-shadow .3s}.glow-gold:hover{box-shadow:0 0 40px rgba(233,193,118,.4)}
  .spotlight{background:radial-gradient(circle at 50% 30%,rgba(30,27,22,.5) 0%,transparent 70%)}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(233,193,118,.2);border-radius:10px}
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex overflow-x-hidden spotlight">
<header class="fixed top-0 w-full z-50 bg-background/90 backdrop-blur-xl border-b border-outline-variant/30 flex justify-between items-center px-8 h-16">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-lg gold-gradient flex items-center justify-center text-sm font-black text-stone-900">G!</div>
    <div><div class="text-[9px] font-bold tracking-[.26em] text-primary/80 leading-none">GFIELD-ON ARCHIVE</div><div class="font-display text-lg font-bold text-primary leading-tight">Smart eBook</div></div>
  </div>
  <div class="flex items-center gap-4">
    <div class="hidden md:flex gap-6 text-on-surface-variant text-sm font-medium">
      <a class="text-primary font-bold border-b border-primary pb-0.5" href="#">서재</a>
      <a class="hover:text-primary transition-colors" href="gfield-on-archive-preview.html">홈으로</a>
    </div>
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-primary/10 border border-primary/20">
      <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
      <span class="text-primary text-xs font-bold" id="studentDisplay">학생</span>
    </div>
  </div>
</header>
<div class="flex w-full pt-16">
  <aside class="hidden lg:flex flex-col w-60 fixed left-0 top-16 h-[calc(100vh-4rem)] bg-surface-container-lowest border-r border-outline-variant/30 overflow-y-auto z-40">
    <div class="px-5 pt-6 pb-4">
      <div class="relative">
        <input id="searchInput" type="text" placeholder="교재 검색..." class="w-full bg-background border border-outline-variant/40 text-on-surface text-sm rounded-lg py-2.5 pl-9 pr-3 focus:border-primary/50 focus:ring-0 outline-none transition-all"/>
        <span class="material-symbols-outlined mat-sym absolute left-2.5 top-2.5 text-outline text-[17px]">search</span>
      </div>
    </div>
    <nav class="flex-1 px-3">
      <div class="text-[9px] font-bold tracking-[.24em] text-primary/70 px-3 mb-2">카테고리</div>
      <div class="space-y-0.5">
        <a data-filter="all" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-primary bg-surface-container border-l-2 border-primary text-sm font-semibold cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">auto_stories</span> 전체</a>
        <a data-filter="thinking" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">psychology</span> 사고력</a>
        <a data-filter="math" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">functions</span> 수학</a>
        <a data-filter="english" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">translate</span> 영어</a>
        <a data-filter="science" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">science</span> 과학</a>
      </div>
      <div class="text-[9px] font-bold tracking-[.24em] text-primary/70 px-3 mt-5 mb-2">상태</div>
      <div class="space-y-0.5">
        <a data-filter="active" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">check_circle</span> 수강 가능</a>
        <a data-filter="preview" class="sidebar-item flex items-center gap-3 py-2.5 px-3 rounded-lg text-on-surface-variant hover:bg-surface-container hover:text-primary text-sm cursor-pointer transition-all"><span class="material-symbols-outlined mat-sym text-[18px]">visibility</span> Preview</a>
      </div>
    </nav>
    <div class="p-4 border-t border-outline-variant/20">
      <button class="w-full gold-gradient text-stone-900 font-bold py-3 rounded-lg text-xs tracking-wider flex items-center justify-center gap-2 glow-gold"><span class="material-symbols-outlined mat-sym text-[16px]">vpn_key</span> VAULT ACCESS</button>
    </div>
  </aside>
  <main class="flex-1 lg:ml-60 min-h-[calc(100vh-4rem)]">
    <div class="detail-panel" id="detailPanel">
      <div class="flex flex-col items-center justify-center p-10 border-r border-outline-variant/20 bg-gradient-to-br from-surface-container-lowest/80 to-transparent relative">
        <div class="detail-book-scene"><div style="position:relative;width:220px"><div class="detail-book-container" id="detailBookWrap"><div class="detail-book-front aspect-[3/4] w-full rounded-r-xl flex flex-col justify-end p-6" id="detailBookCover"></div></div></div></div>
        <button onclick="closeDetail()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-surface-container border border-outline-variant/30 text-on-surface-variant hover:text-primary flex items-center justify-center transition-colors"><span class="material-symbols-outlined mat-sym text-[18px]">close</span></button>
      </div>
      <div class="p-10 flex flex-col justify-center gap-5" id="detailBody"></div>
    </div>
    <div class="px-8 py-10 max-w-[1600px] mx-auto">
      <div class="flex justify-between items-end mb-8 border-b border-outline-variant/20 pb-6">
        <div><div class="text-[9px] font-bold tracking-[.28em] text-primary/70 mb-1">SMART EBOOK LIBRARY</div><h2 class="font-display text-3xl font-bold text-primary">승인된 교재 서재</h2></div>
        <div class="flex items-center gap-3"><span class="px-3 py-1.5 bg-primary/10 border border-primary/20 text-primary text-xs font-bold rounded-full" id="bookCountChip">교재 로딩 중</span><span class="px-3 py-1.5 bg-secondary-container/20 border border-secondary/20 text-secondary text-xs font-bold rounded-full">영상 강의 연결</span></div>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-8" id="bookGrid"></div>
    </div>
  </main>
</div>
<script>
const BOOKS=[
  {id:'hs-thinking-basic',title:'HS THINKING\nBASIC',displayTitle:'HS THINKING BASIC',subject:'사고력',category:'thinking',course:'HS 과정',badge:'FLAGSHIP',status:'active',statusLabel:'수강 가능',desc:'고등 수학적 사고의 기초를 다지는 GFIELD 대표 교재. 문제 해결 전략과 창의적 사고를 동시에 훈련하며, 영상 강의와 연동된 입체적인 학습 경험을 제공합니다.',hasVideo:true,hasMaterial:true,hasAnswer:true,pages:45,coverGrad:'linear-gradient(145deg,#0d2b4a,#162c4f)',badgeColor:'rgba(96,165,250,.2)',badgeText:'#93c5fd',viewerUrl:'books/hs-thinking-basic/viewer-v2.html?book=hs-thinking-basic'},
  {id:'hs-algebra2',title:'ALGEBRA 2\nPREMIER',displayTitle:'Algebra 2 Premier',subject:'수학',category:'math',course:'HS 과정',badge:'MATH',status:'preview',statusLabel:'Preview',desc:'대수 2 심화 과정. 다항식, 지수·로그, 삼각함수를 체계적으로 다룹니다.',hasVideo:false,hasMaterial:true,hasAnswer:false,pages:62,coverGrad:'linear-gradient(145deg,#1a0a3d,#280f5a)',badgeColor:'rgba(167,139,250,.2)',badgeText:'#c4b5fd',viewerUrl:null},
  {id:'ms-thinking-core',title:'MS THINKING\nCORE',displayTitle:'MS THINKING CORE',subject:'사고력',category:'thinking',course:'MS 과정',badge:'THINKING',status:'preview',statusLabel:'Preview',desc:'중등 심화 사고력 훈련 교재. 논리적 사고와 문제 분석 능력을 단계적으로 키워나갑니다.',hasVideo:false,hasMaterial:false,hasAnswer:false,pages:38,coverGrad:'linear-gradient(145deg,#0a2e1e,#103a28)',badgeColor:'rgba(34,197,94,.2)',badgeText:'#86efac',viewerUrl:null},
  {id:'hs-english',title:'HS ENGLISH\nREADING',displayTitle:'HS English Reading',subject:'영어',category:'english',course:'HS 과정',badge:'ENGLISH',status:'soon',statusLabel:'준비중',desc:'고등 수준 영어 독해 교재.',hasVideo:false,hasMaterial:false,hasAnswer:false,pages:54,coverGrad:'linear-gradient(145deg,#2d1f00,#4a3300)',badgeColor:'rgba(233,193,118,.2)',badgeText:'#e9c176',viewerUrl:null},
  {id:'science-thinking',title:'SCIENCE\nTHINKING',displayTitle:'Science Thinking',subject:'과학',category:'science',course:'HS 과정',badge:'SCIENCE',status:'soon',statusLabel:'준비중',desc:'과학적 사고력과 탐구 능력을 기르는 교재.',hasVideo:false,hasMaterial:false,hasAnswer:false,pages:48,coverGrad:'linear-gradient(145deg,#2d0a0a,#4a1010)',badgeColor:'rgba(248,113,113,.2)',badgeText:'#fca5a5',viewerUrl:null},
  {id:'ms-math',title:'MS MATH\nBASIC',displayTitle:'MS Math Basic',subject:'수학',category:'math',course:'MS 과정',badge:'MATH',status:'soon',statusLabel:'준비중',desc:'중등 수학 기초 교재.',hasVideo:false,hasMaterial:false,hasAnswer:false,pages:58,coverGrad:'linear-gradient(145deg,#1e293b,#0f172a)',badgeColor:'rgba(148,163,184,.18)',badgeText:'#cbd5e1',viewerUrl:null},
];
let filterVal='all',searchVal='',selectedId=null;
(function init(){
  const n=sessionStorage.getItem('gfield_student_name')||'';
  document.getElementById('studentDisplay').textContent=n?n+' 학생':'학생';
  renderGrid();
  document.querySelectorAll('.sidebar-item[data-filter]').forEach(el=>{el.addEventListener('click',()=>{document.querySelectorAll('.sidebar-item').forEach(i=>{i.classList.remove('text-primary','bg-surface-container','border-l-2','border-primary','font-semibold');i.classList.add('text-on-surface-variant');});el.classList.add('text-primary','bg-surface-container','border-l-2','border-primary','font-semibold');el.classList.remove('text-on-surface-variant');filterVal=el.dataset.filter;renderGrid();});});
  document.getElementById('searchInput').addEventListener('input',e=>{searchVal=e.target.value;renderGrid();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();});
})();
function filtered(){return BOOKS.filter(b=>{const fm=filterVal==='all'||b.category===filterVal||b.status===filterVal;const q=searchVal.toLowerCase();return fm&&(!q||b.displayTitle.toLowerCase().includes(q)||b.subject.includes(q)||b.course.includes(q));});}
function statusBadge(b){if(b.status==='active')return 'bg-green-900/40 text-green-400 border border-green-500/30';if(b.status==='preview')return 'bg-primary/10 text-primary border border-primary/30';return 'bg-surface-variant/50 text-on-surface-variant border border-outline-variant/30';}
function renderGrid(){
  const grid=document.getElementById('bookGrid');const chip=document.getElementById('bookCountChip');const books=filtered();
  chip.textContent=`교재 ${books.length}권`;grid.innerHTML='';
  books.forEach(b=>{
    const wrap=document.createElement('div');wrap.className='book-wrapper cursor-pointer group'+(selectedId===b.id?' selected':'');wrap.dataset.id=b.id;
    wrap.innerHTML=`<div class="book-scene"><div style="position:relative"><div class="book-shadow"></div><div class="book-container"><div class="book-front aspect-[3/4] w-full rounded-r-xl flex flex-col justify-end p-4 relative" style="background:${b.coverGrad}"><div class="absolute top-2 right-2 px-2 py-0.5 rounded-full text-[9px] font-bold ${statusBadge(b)}">${b.statusLabel}</div><div class="inline-block px-2 py-0.5 rounded-full text-[9px] font-bold mb-2" style="background:${b.badgeColor};color:${b.badgeText};border:1px solid ${b.badgeText}33">${b.badge}</div><div class="text-white font-bold text-sm leading-tight" style="text-shadow:0 2px 8px rgba(0,0,0,.7)">${b.title.replace('\n','<br>')}</div><div class="text-white/50 text-[9px] font-semibold tracking-wider mt-1">${b.subject} · ${b.course}</div></div></div></div></div><div class="mt-3 text-center"><div class="text-on-surface text-xs font-semibold group-hover:text-primary transition-colors leading-tight">${b.displayTitle}</div><div class="text-on-surface-variant text-[10px] mt-0.5">${b.course}</div></div>`;
    wrap.addEventListener('click',()=>openDetail(b));grid.appendChild(wrap);
  });
  if(!books.length)grid.innerHTML='<div class="col-span-full text-center py-20 text-on-surface-variant text-sm">해당 교재가 없습니다</div>';
}
function openDetail(b){
  selectedId=b.id;renderGrid();
  const cover=document.getElementById('detailBookCover');cover.style.background=b.coverGrad;
  cover.innerHTML=`<div class="inline-block px-2.5 py-1 rounded-full text-[10px] font-bold mb-3" style="background:${b.badgeColor};color:${b.badgeText};border:1px solid ${b.badgeText}33">${b.badge}</div><div class="text-white font-bold text-xl leading-tight mb-1" style="text-shadow:0 2px 12px rgba(0,0,0,.8)">${b.title.replace('\n','<br>')}</div><div class="text-white/50 text-xs font-semibold tracking-wider">${b.subject} · ${b.course}</div>`;
  const name=sessionStorage.getItem('gfield_student_name')||'';
  const viewerUrl=b.viewerUrl?(b.viewerUrl+(name?`&student=${encodeURIComponent(name)}`:'')):'';
  const hasLink=b.status==='active'&&viewerUrl;
  document.getElementById('detailBody').innerHTML=`
    <div><div class="text-[9px] font-bold tracking-[.26em] text-primary/70 mb-2">${b.subject} · ${b.course}</div><h2 class="font-display text-4xl font-bold text-primary leading-tight">${b.displayTitle}</h2></div>
    <div class="flex flex-wrap gap-2"><span class="px-3 py-1 rounded-full text-xs font-bold ${statusBadge(b)}">${b.statusLabel}</span>${b.hasVideo?'<span class="px-3 py-1 rounded-full text-xs font-bold bg-green-900/30 text-green-400 border border-green-500/20">영상 강의 연결</span>':'<span class="px-3 py-1 rounded-full text-xs font-bold bg-surface-variant/40 text-on-surface-variant border border-outline-variant/20">영상 준비중</span>'}${b.hasMaterial?'<span class="px-3 py-1 rounded-full text-xs font-bold bg-secondary-container/20 text-secondary border border-secondary/20">학습 자료</span>':''}${b.hasAnswer?'<span class="px-3 py-1 rounded-full text-xs font-bold bg-secondary-container/20 text-secondary border border-secondary/20">정답/해설</span>':''}</div>
    <p class="text-on-surface-variant leading-relaxed text-sm">${b.desc}</p>
    <div class="grid grid-cols-2 gap-3"><div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20"><div class="text-[9px] font-bold tracking-widest text-primary/70 mb-1">과목</div><div class="text-on-surface font-semibold text-sm">${b.subject}</div></div><div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20"><div class="text-[9px] font-bold tracking-widest text-primary/70 mb-1">과정</div><div class="text-on-surface font-semibold text-sm">${b.course}</div></div><div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20"><div class="text-[9px] font-bold tracking-widest text-primary/70 mb-1">구성</div><div class="text-on-surface font-semibold text-sm">총 ${b.pages}쪽</div></div><div class="p-3 bg-surface-container rounded-xl border border-outline-variant/20"><div class="text-[9px] font-bold tracking-widest text-primary/70 mb-1">영상 강의</div><div class="font-semibold text-sm ${b.hasVideo?'text-green-400':'text-on-surface-variant'}">${b.hasVideo?'✅ 연결됨':'준비중'}</div></div></div>
    <div class="flex gap-3 flex-wrap">${hasLink?`<a href="${viewerUrl}" class="px-8 py-4 gold-gradient text-stone-900 font-bold rounded-xl flex items-center gap-2 transition-all transform hover:scale-105 glow-gold text-sm"><span class="material-symbols-outlined mat-sym text-[18px]">menu_book</span>이북 강의 보기</a>`:'<button class="px-8 py-4 bg-surface-variant/40 text-on-surface-variant border border-outline-variant/30 font-bold rounded-xl flex items-center gap-2 text-sm cursor-default"><span class="material-symbols-outlined mat-sym text-[18px]">menu_book</span>이북 강의 보기</button>'}<button onclick="showZoomNote(this)" class="px-8 py-4 bg-secondary-container/20 border border-secondary/30 text-secondary font-bold rounded-xl flex items-center gap-2 text-sm hover:bg-secondary-container/30 transition-colors"><span class="material-symbols-outlined mat-sym text-[18px]">video_call</span>줌 강의 일정 문의</button></div>
    <div id="zoomNote" class="hidden text-xs text-on-surface-variant bg-surface-container rounded-lg p-3 border border-outline-variant/20">📌 <span class="text-secondary font-semibold">줌 강의 안내:</span> 줌 강의 일정은 담당 선생님께 문의해 주세요.</div>
    ${!hasLink?`<div class="text-xs text-on-surface-variant">※ 현재 <strong class="text-outline">${b.statusLabel}</strong> 상태입니다.</div>`:''}
  `;
  const panel=document.getElementById('detailPanel');panel.classList.add('open');panel.scrollIntoView({behavior:'smooth',block:'start'});
}
function closeDetail(){selectedId=null;renderGrid();document.getElementById('detailPanel').classList.remove('open');}
function showZoomNote(btn){document.getElementById('zoomNote').classList.remove('hidden');btn.textContent='📌 문의 안내 확인';btn.classList.add('opacity-60');}
document.body.addEventListener('mousemove',e=>{const x=(e.clientX/window.innerWidth)*100;const y=(e.clientY/window.innerHeight)*100;document.body.style.background=`radial-gradient(circle at ${x}% ${y}%, #1a160f 0%, #0f141a 60%)`;});
</script>
</body>
</html>
